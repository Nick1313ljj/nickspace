<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>单据匹配工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f0f2f5;
    --surface: #ffffff;
    --surface2: #e8eaed;
    --border: #d1d5db;
    --accent: #00a87a;
    --accent-dim: rgba(0,168,122,0.1);
    --blue: #2563eb;
    --blue-dim: rgba(37,99,235,0.1);
    --warn: #dc6027;
    --text: #1a1d23;
    --muted: #6b7280;
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --ali-a: #0ea5e9;   /* Aliapos blue */
    --ali-b: #f59e0b;   /* Alibaba amber */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; padding:20px 14px 80px; }

  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(rgba(0,0,0,0.03) 1px,transparent 1px), linear-gradient(90deg,rgba(0,0,0,0.03) 1px,transparent 1px);
    background-size:48px 48px; pointer-events:none; z-index:0;
  }

  .wrap { max-width:900px; margin:0 auto; position:relative; z-index:1; }

  /* Header */
  .header { margin-bottom:20px; }
  .badge { display:inline-flex; align-items:center; gap:5px; font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.15em; text-transform:uppercase; border:1px solid rgba(0,168,122,.35); padding:3px 10px; margin-bottom:10px; background:var(--accent-dim); }
  .badge::before { content:'◆'; font-size:7px; }
  h1 { font-family:var(--mono); font-size:clamp(18px,3.5vw,28px); font-weight:600; letter-spacing:-.02em; }
  h1 em { font-style:normal; color:var(--accent); }
  .desc { margin-top:6px; color:var(--muted); font-size:11px; font-family:var(--mono); }

  /* Sections */
  .section { background:var(--surface); border:1px solid var(--border); padding:14px 16px; margin-bottom:12px; }
  .sec-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .sec-title { font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; }

  /* DB tabs */
  .db-tabs { display:flex; gap:6px; margin-bottom:10px; }
  .db-tab { font-family:var(--mono); font-size:10px; padding:4px 12px; border:1px solid var(--border); background:transparent; cursor:pointer; letter-spacing:.06em; text-transform:uppercase; transition:all .15s; }
  .db-tab.ali-a { color:var(--ali-a); border-color:var(--ali-a); }
  .db-tab.ali-b { color:var(--ali-b); border-color:var(--ali-b); }
  .db-tab.active.ali-a { background:var(--ali-a); color:#fff; }
  .db-tab.active.ali-b { background:var(--ali-b); color:#fff; }

  /* Month tags */
  .month-section { margin-bottom:10px; }
  .month-section-label { font-family:var(--mono); font-size:10px; color:var(--muted); margin-bottom:5px; letter-spacing:.08em; }
  .month-list { display:flex; flex-wrap:wrap; gap:6px; min-height:24px; align-items:center; }
  .month-tag { display:inline-flex; align-items:center; gap:5px; background:var(--surface2); border:1px solid var(--border); padding:3px 8px; font-family:var(--mono); font-size:11px; }
  .month-tag em { font-style:normal; font-size:10px; }
  .month-tag.ali-a em { color:var(--ali-a); }
  .month-tag.ali-b em { color:var(--ali-b); }
  .del-month { background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px; padding:0 0 0 3px; }
  .del-month:hover { color:var(--warn); }
  .no-data { font-family:var(--mono); font-size:11px; color:var(--muted); font-style:italic; }

  /* Date check panel */
  .date-check-panel { display:none; background:var(--surface2); border:1px solid var(--border); padding:12px 14px; margin-bottom:10px; }
  .date-check-panel .mono { font-family:var(--mono); font-size:11px; line-height:1.9; }

  /* Textarea */
  .add-row { display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap; }
  .add-row textarea { flex:1; min-width:180px; background:var(--bg); border:1px solid var(--border); color:var(--text); font-family:var(--mono); font-size:12px; line-height:1.6; padding:8px 10px; outline:none; resize:vertical; min-height:65px; transition:border-color .2s; }
  .add-row textarea:focus { border-color:var(--blue); }
  .add-row textarea::placeholder { color:var(--muted); }
  .add-btns { display:flex; flex-direction:column; gap:5px; }
  .add-btns-row { display:flex; gap:5px; flex-wrap:wrap; }

  /* Panel A */
  .panel-a { background:#dbeafe; border:1px solid #93c5fd; padding:14px 16px; margin-bottom:12px; }
  .panel-a textarea { background:#eff6ff; border-color:#93c5fd; }
  .panel-a textarea:focus { border-color:var(--blue); }
  .panel-header { display:flex; align-items:center; gap:7px; margin-bottom:10px; flex-wrap:wrap; }

  /* Buttons */
  .hbtn { background:transparent; border:1px solid var(--border); color:var(--muted); font-family:var(--mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase; padding:3px 9px; cursor:pointer; transition:color .15s,border-color .15s; white-space:nowrap; }
  .hbtn:hover { color:var(--warn); border-color:var(--warn); }
  .hbtn.blue:hover { color:var(--blue); border-color:var(--blue); }
  input[type=file] { display:none; }

  .btn { display:inline-flex; align-items:center; gap:6px; padding:9px 18px; font-family:var(--mono); font-size:12px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; border:none; transition:opacity .15s,transform .1s; white-space:nowrap; }
  .btn:active { transform:scale(.97); }
  .btn-match { background:var(--accent); color:#fff; }
  .btn-match:hover { opacity:.88; }
  .btn-export { background:transparent; color:var(--blue); border:1px solid var(--blue); }
  .btn-export:hover { background:var(--blue-dim); }
  .btn-export:disabled { opacity:.3; cursor:not-allowed; }
  .btn-sm { background:transparent; color:var(--muted); border:1px solid var(--border); font-size:11px; padding:9px 13px; }
  .btn-copy { background:transparent; border:1px solid var(--accent); color:var(--accent); font-family:var(--mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:4px 10px; cursor:pointer; transition:background .15s; }
  .btn-copy:hover { background:var(--accent-dim); }

  /* Action bar */
  .action-bar { display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  .stat-row { margin-left:auto; display:flex; gap:14px; font-family:var(--mono); font-size:11px; color:var(--muted); }
  .stat-row em { font-style:normal; font-weight:600; color:var(--accent); }

  /* Section title */
  .section-title { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); margin-bottom:8px; display:flex; align-items:center; gap:8px; }
  .section-title::after { content:''; flex:1; height:1px; background:var(--border); }

  /* Tables */
  .table-scroll { overflow-x:auto; background:var(--surface); border:1px solid var(--border); margin-bottom:12px; }
  table { width:100%; border-collapse:collapse; font-family:var(--mono); font-size:12px; }
  thead tr { background:var(--surface2); border-bottom:1px solid var(--border); }
  th { padding:8px 12px; text-align:left; font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600; white-space:nowrap; }
  th.num { text-align:right; }
  tbody tr { border-bottom:1px solid rgba(0,0,0,.05); transition:background .1s; }
  tbody tr:hover { background:var(--surface2); }
  td { padding:7px 12px; vertical-align:middle; color:var(--text); }
  td.num { text-align:right; }
  td.date { color:var(--muted); white-space:nowrap; }
  td.docno { color:var(--accent); font-weight:600; white-space:nowrap; }
  td.amt { text-align:right; color:var(--blue); white-space:nowrap; }

  /* GT table */
  .gt-table th.num { text-align:right; }
  .gt-table td.num { text-align:right; }
  .gt-total-row { background:var(--surface2); font-weight:600; border-top:2px solid var(--border); }
  .gt-total-row td { color:var(--accent); }

  /* Output C */
  .outc-section { background:var(--surface); border:1px solid #c4b5fd; padding:14px 16px; margin-bottom:12px; }
  .outc-header { display:flex; align-items:center; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
  .outc-title { font-family:var(--mono); font-size:11px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:#7c3aed; }
  .outc-table-wrap { overflow-x:auto; margin-bottom:10px; }
  .outc-table { border-collapse:collapse; font-family:var(--mono); font-size:12px; }
  .outc-table th, .outc-table td { border:1px solid var(--border); padding:5px 8px; white-space:nowrap; }
  .outc-table th { background:var(--surface2); font-size:10px; letter-spacing:.07em; color:var(--muted); font-weight:600; text-align:center; }
  .outc-table td { text-align:right; }
  .outc-table td.left { text-align:left; }
  .outc-table .sep-row td { border-top:2px solid var(--border); background:var(--surface2); font-weight:600; }
  .outc-table .discount-row td { color:var(--warn); font-weight:600; background:var(--surface2); }
  .outc-table .strike-row td { color:var(--blue); font-weight:600; background:var(--surface2); }
  .outc-table .balance-row td { background:#fef08a; color:#854d0e; font-weight:700; }
  .outc-btns { display:flex; gap:5px; flex-wrap:wrap; align-items:center; margin-left:auto; }

  /* Image preview */
  .img-preview { margin-top:10px; text-align:center; }
  .img-preview canvas { max-width:100%; border:1px solid var(--border); display:block; margin:0 auto 8px; }

  /* WA preview */
  .wa-preview { background:#e0f7f7; border:1px solid #a7d8d8; padding:12px 14px; margin-bottom:12px; }
  .wa-preview-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
  .wa-label { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:#2d7a7a; }
  .wa-text { font-family:var(--mono); font-size:12px; color:var(--text); line-height:1.8; white-space:pre; overflow-x:auto; }

  /* Results */
  .results-section { background:var(--surface); border:1px solid var(--border); padding:14px 16px; margin-bottom:12px; display:none; }

  /* Dialog */
  .overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:100; align-items:center; justify-content:center; }
  .overlay.show { display:flex; }
  .dialog { background:var(--surface); border:1px solid var(--border); padding:20px 24px; max-width:320px; width:90%; }
  .dialog-title { font-family:var(--mono); font-size:13px; font-weight:600; color:var(--warn); margin-bottom:8px; }
  .dialog-msg { font-family:var(--mono); font-size:12px; color:var(--muted); margin-bottom:18px; line-height:1.6; white-space:pre-line; }
  .dialog-btns { display:flex; gap:8px; justify-content:flex-end; flex-wrap:wrap; }
  .dialog-btns button { font-family:var(--mono); font-size:11px; padding:6px 14px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--muted); text-transform:uppercase; letter-spacing:.06em; transition:all .15s; }
  .dialog-btns .d-ali-a { color:var(--ali-a); border-color:var(--ali-a); }
  .dialog-btns .d-ali-b { color:var(--ali-b); border-color:var(--ali-b); }
  .dialog-btns .confirm-del { color:var(--warn); border-color:var(--warn); }
  .dialog-btns button:hover { opacity:.8; }

  /* Toast */
  .toast { position:fixed; bottom:22px; right:18px; background:var(--text); border:1px solid var(--border); padding:9px 16px; font-family:var(--mono); font-size:12px; color:#fff; z-index:999; opacity:0; transform:translateY(8px); transition:all .25s; pointer-events:none; max-width:260px; }
  .toast.show { opacity:1; transform:translateY(0); }

  /* Counter */
  .counter { margin-top:5px; font-family:var(--mono); font-size:11px; color:var(--muted); text-align:right; }
  .counter em { color:var(--blue); font-style:normal; font-weight:600; }
</style>
</head>
<body>
<div class="wrap">

<!-- Header -->
<div class="header">
  <div class="badge">单据匹配系统</div>
  <h1>单据号码 <em>匹配工具</em></h1>
  <p class="desc">中奖资料永久保存在本机 · 两组资料库 · 按月份管理</p>
</div>

<!-- ══ 中奖资料库 ══ -->
<div class="section">
  <div class="sec-header">
    <span class="sec-title" style="color:var(--accent)">中奖资料库</span>
    <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">
      Aliapos <em id="totalA" style="color:var(--ali-a);font-style:normal;font-weight:600">0</em>条 ·
      Alibaba <em id="totalB" style="color:var(--ali-b);font-style:normal;font-weight:600">0</em>条
    </span>
    <button class="hbtn" style="margin-left:auto;color:var(--accent);border-color:var(--accent)" onclick="toggleDateCheck()">📅 检查日期</button>
  </div>

  <!-- Month display: two groups -->
  <div class="month-section">
    <div class="month-section-label" style="color:var(--ali-a)">▸ ALIAPOS</div>
    <div class="month-list" id="monthListA"><span class="no-data">空</span></div>
  </div>
  <div class="month-section">
    <div class="month-section-label" style="color:var(--ali-b)">▸ ALIBABA</div>
    <div class="month-list" id="monthListB"><span class="no-data">空</span></div>
  </div>

  <!-- Date check panel -->
  <div class="date-check-panel" id="dateCheckPanel">
    <div class="mono" id="dateCheckContent"></div>
  </div>

  <!-- Add data -->
  <div class="add-row">
    <textarea id="inputBAdd" placeholder="在此粘贴中奖资料，然后按「添加到资料库」选择要存入哪一组。关闭浏览器也不会消失。"></textarea>
    <div class="add-btns">
      <div class="add-btns-row">
        <input type="file" id="fileBAdd" accept=".txt,text/plain" onchange="loadFileToAdd()">
        <button class="hbtn blue" onclick="document.getElementById('fileBAdd').click()">📂 载入</button>
        <button class="hbtn" style="color:var(--accent);border-color:var(--accent)" onclick="promptAddDB()">＋ 添加</button>
      </div>
      <div style="margin-top:6px">
        <button class="hbtn" onclick="document.getElementById('inputBAdd').value='';document.getElementById('fileBAdd').value=''">✕ 清空</button>
      </div>
    </div>
  </div>
</div>

<!-- ══ A 组 ══ -->
<div class="panel-a">
  <div class="panel-header">
    <span class="sec-title" style="color:var(--blue)">A 组 — 单据来源</span>
    <span style="font-family:var(--mono);font-size:10px;color:var(--muted)">完整单据 或 手动5位号码</span>
    <input type="file" id="fileA" accept=".txt,text/plain" onchange="loadFile('A')">
    <button class="hbtn" style="margin-left:auto;color:var(--blue);border-color:var(--blue)" onclick="document.getElementById('fileA').click()">📂 文件</button>
    <button class="hbtn" onclick="clearA()">✕</button>
  </div>
  <textarea class="main-ta" id="inputA" style="width:100%;background:#eff6ff;border:1px solid #93c5fd;color:var(--text);font-family:var(--mono);font-size:12px;line-height:1.65;padding:10px 12px;resize:vertical;outline:none;min-height:80px;transition:border-color .2s;" placeholder="粘贴完整单据（自动提取日期），或每行一个5位号码"></textarea>
  <div class="counter" id="counterA">—</div>
</div>

<!-- ══ Action bar ══ -->
<div class="action-bar">
  <button class="btn btn-match" onclick="runMatch()">▶ 开始匹配</button>
  <button class="btn btn-export" id="btnExport" onclick="exportMatchExcel()" disabled>⬇ 匹配Excel</button>
  <div class="stat-row" id="statRow" style="display:none">
    <span>B库 <em id="sTotal">0</em>条</span>
    <span>匹配 <em id="sMatch">0</em></span>
  </div>
</div>

<!-- ══ 1. Output C ══ -->
<div class="outc-section" id="outcSection" style="display:none">
  <div class="outc-header">
    <span class="outc-title">输出 C — 精装汇总表</span>
    <div class="outc-btns">
      <button class="btn-copy" style="border-color:#7c3aed;color:#7c3aed" onclick="exportOutC()">⬇ Excel</button>
      <button class="btn-copy" style="border-color:#7c3aed;color:#7c3aed" onclick="generateImage()">📷 图片</button>
      <button class="btn-copy" style="border-color:#7c3aed;color:#7c3aed" onclick="downloadImage()">⬇ 存图</button>
    </div>
  </div>
  <div class="outc-table-wrap">
    <table class="outc-table" id="outcTable"></table>
  </div>
  <!-- Canvas image preview -->
  <div class="img-preview" id="imgPreview" style="display:none">
    <canvas id="outcCanvas" style="display:none"></canvas>
    <img id="outcImg" style="max-width:100%;border:1px solid var(--border);display:none;border-radius:4px" alt="输出C图片">
    <p style="font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:6px">长按图片 → 保存到相册 → 发送到 WhatsApp</p>
  </div>
</div>

<!-- ══ 2. WA preview ══ -->
<div class="wa-preview" id="waSection" style="display:none">
  <div class="wa-preview-header">
    <span class="wa-label">📱 WhatsApp 格式预览</span>
    <button class="btn-copy" onclick="copyWA()">复制</button>
  </div>
  <div class="wa-text" id="waText"></div>
</div>

<!-- ══ 3. Match results ══ -->
<div class="results-section" id="resultsSection">
  <div class="section-title">匹配结果</div>
  <div class="table-scroll">
    <table>
      <thead><tr>
        <th>日期</th><th>单据号</th><th>中奖资料行</th><th>投注类型</th><th class="num">金额</th><th>来源</th>
      </tr></thead>
      <tbody id="resultBody"></tbody>
    </table>
  </div>
</div>

<!-- ══ 4. GT summary ══ -->
<div class="results-section" id="gtSection">
  <div class="section-title">A 组 — GT 汇总 <span id="gtCount" style="color:var(--accent);font-style:normal;margin-left:6px"></span></div>
  <div class="table-scroll">
    <table class="gt-table">
      <thead><tr>
        <th>Date</th><th>单据号</th><th class="num">RM</th><th class="num">SGD</th><th class="num">扣</th><th class="num">扣中字</th><th class="num">尚欠</th>
      </tr></thead>
      <tbody id="gtBody"></tbody>
    </table>
  </div>
  <button class="btn-copy" style="margin-top:6px" onclick="exportGT()">⬇ 导出GT表</button>
</div>

</div><!-- end wrap -->

<!-- Choose DB dialog -->
<div class="overlay" id="overlayDB">
  <div class="dialog">
    <div class="dialog-title">选择资料库</div>
    <div class="dialog-msg" id="dialogDBMsg">请选择要添加到哪个资料库：</div>
    <div class="dialog-btns">
      <button onclick="closeDialogDB()" class="hbtn">取消</button>
      <button class="d-ali-a" onclick="doAdd('A')">Aliapos</button>
      <button class="d-ali-b" onclick="doAdd('B')">Alibaba</button>
    </div>
  </div>
</div>

<!-- Confirm delete dialog -->
<div class="overlay" id="overlayDel">
  <div class="dialog">
    <div class="dialog-title" id="delTitle">确认删除</div>
    <div class="dialog-msg" id="delMsg"></div>
    <div class="dialog-btns">
      <button onclick="closeDialogDel()">取消</button>
      <button class="confirm-del" id="delConfirm">删除</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ════════════════════════════════════════════════════════
// STORAGE — two prefixes
// ════════════════════════════════════════════════════════
const PRE = { A: 'ali_a_', B: 'ali_b_' };

function getKeys(grp) {
  const keys = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(PRE[grp])) keys.push(k);
  }
  return keys.sort();
}

function getData(key) {
  try { return JSON.parse(localStorage.getItem(key)) || []; }
  catch { return []; }
}

function saveData(key, recs) { localStorage.setItem(key, JSON.stringify(recs)); }
function delData(key) { localStorage.removeItem(key); }

function mkKey(grp, dateStr) {
  if (!dateStr) return null;
  const m = dateStr.match(/^(\d{4}-\d{2})/);
  return m ? PRE[grp] + m[1] : null;
}

function keyLabel(key) {
  const s = key.replace(PRE['A'], '').replace(PRE['B'], '');
  const [y, mo] = s.split('-');
  return `${y}年${parseInt(mo)}月`;
}

function getAllRecords() {
  const all = [];
  for (const k of getKeys('A')) getData(k).forEach(r => all.push({...r, _grp:'A'}));
  for (const k of getKeys('B')) getData(k).forEach(r => all.push({...r, _grp:'B'}));
  return all;
}

// ════════════════════════════════════════════════════════
// UI — refresh month tags
// ════════════════════════════════════════════════════════
function refreshUI() {
  ['A','B'].forEach(grp => {
    const listId = grp === 'A' ? 'monthListA' : 'monthListB';
    const totalId = grp === 'A' ? 'totalA' : 'totalB';
    const keys = getKeys(grp);
    const list = document.getElementById(listId);
    let total = 0;
    if (!keys.length) {
      list.innerHTML = '<span class="no-data">空</span>';
    } else {
      list.innerHTML = '';
      keys.forEach(k => {
        const recs = getData(k);
        const realRecs = recs.filter(r => !r._noWin);
        const noWinRecs = recs.filter(r => r._noWin);
        total += recs.length;
        const tag = document.createElement('span');
        tag.className = `month-tag ali-${grp.toLowerCase()}`;
        const noWinNote = noWinRecs.length ? ` <span style="font-size:9px;color:var(--muted)">(+${noWinRecs.length}无中奖)</span>` : '';
        tag.innerHTML = `${keyLabel(k)} <em>${realRecs.length}条</em>${noWinNote} <button class="del-month" onclick="confirmDel('${grp}','${k}')">×</button>`;
        list.appendChild(tag);
      });
    }
    document.getElementById(totalId).textContent = total;
  });
}

let _pendingText = '';

function promptAddDB() {
  const text = document.getElementById('inputBAdd').value.trim();
  if (!text) { showToast('请先输入或载入资料'); return; }
  const recs = parseB(text);
  if (!recs.length) { showToast('未识别到任何记录，请检查格式'); return; }
  _pendingText = text;
  const cnt = recs.length;
  document.getElementById('dialogDBMsg').textContent = `识别到 ${cnt} 条记录，请选择资料库：`;
  document.getElementById('overlayDB').classList.add('show');
}

function doAdd(grp) {
  closeDialogDB();
  const recs = parseB(_pendingText);
  const groups = {};
  let noDate = 0;
  for (const r of recs) {
    const k = mkKey(grp, r.dateB);
    if (!k) { noDate++; continue; }
    if (!groups[k]) groups[k] = [];
    groups[k].push(r);
  }
  let added = 0, skipped = 0;
  for (const [k, rs] of Object.entries(groups)) {
    const existing = getData(k);
    const ids = new Set(existing.map(r => r.docNo+'|'+r.dateB+(r._noWin?'|nowin':'')));
    const newOnes = rs.filter(r => {
      const key = r.docNo+'|'+r.dateB+(r._noWin?'|nowin':'');
      return !ids.has(key);
    });
    skipped += rs.length - newOnes.length;
    added += newOnes.length;
    if (newOnes.length) saveData(k, [...existing, ...newOnes]);
  }
  document.getElementById('inputBAdd').value = '';
  document.getElementById('fileBAdd').value = '';
  _pendingText = '';
  refreshUI();
  let msg = `已添加 ${added} 条到 ${grp==='A'?'Aliapos':'Alibaba'}`;
  if (skipped) msg += `，跳过 ${skipped} 条重复`;
  if (noDate) msg += `，${noDate} 条无日期`;
  showToast(msg);
}

function closeDialogDB() { document.getElementById('overlayDB').classList.remove('show'); }
document.getElementById('overlayDB').addEventListener('click', e => { if (e.target===document.getElementById('overlayDB')) closeDialogDB(); });

function toggleDateCheck() {
  const panel = document.getElementById('dateCheckPanel');
  if (panel.style.display === 'block') { panel.style.display = 'none'; return; }
  const allRecs = getAllRecords();
  if (!allRecs.length) { showToast('资料库是空的'); return; }

  let html = '';
  ['A','B'].forEach(grp => {
    const recs = getAllRecords().filter(r => r._grp === grp);
    if (!recs.length) return;
    const dateSet = new Set(recs.map(r => r.dateB).filter(Boolean));
    const noWinDates = new Set(recs.filter(r => r._noWin).map(r => r.dateB).filter(Boolean));
    const byMonth = {};
    [...dateSet].sort().forEach(d => {
      const mo = d.slice(0,7);
      if (!byMonth[mo]) byMonth[mo] = [];
      byMonth[mo].push(d);
    });
    const color = grp === 'A' ? 'var(--ali-a)' : 'var(--ali-b)';
    const name = grp === 'A' ? 'Aliapos' : 'Alibaba';
    html += `<div style="font-weight:600;color:${color};margin-bottom:4px">▸ ${name}</div>`;
    for (const [mo, dates] of Object.entries(byMonth).sort()) {
      const [y, mn] = mo.split('-');
      const days = new Date(+y, +mn, 0).getDate();
      const missing = [];
      for (let d = 1; d <= days; d++) {
        if (!dateSet.has(`${y}-${mn}-${String(d).padStart(2,'0')}`)) missing.push(d);
      }
      html += `<div style="margin-bottom:8px;padding-left:8px">`;
      html += `<div style="color:var(--text);font-weight:600">${y}年${parseInt(mn)}月</div>`;
      html += `<div style="color:var(--accent)">✓ ${dates.map(d => {
        const day = d.slice(8).replace(/^0/,'');
        return noWinDates.has(d) ? `<span style="color:var(--muted)">${day}(无中奖)</span>` : day;
      }).join('、')} 日</div>`;
      if (missing.length) html += `<div style="color:var(--warn)">⚠ 缺少：${missing.join('、')} 日</div>`;
      else html += `<div style="color:var(--muted)">本月完整</div>`;
      html += `</div>`;
    }
  });
  document.getElementById('dateCheckContent').innerHTML = html;
  panel.style.display = 'block';
}

// ════════════════════════════════════════════════════════
// PARSERS
// ════════════════════════════════════════════════════════
function parseA(text) {
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  const hasDate = lines.some(l => /\d{2}\.\d{2}\.\d{2}\s+\d{3,4}/.test(l) || /\{(\d{4})\}/.test(l));
  const map = new Map();

  if (!hasDate) {
    for (const line of lines)
      for (const m of line.matchAll(/(?<!\d)(\d{5})(?!\d)/g))
        map.set(m[1], '');
    return { mode:'manual', map };
  }

  let cur = '';
  for (const line of lines) {
    let m = line.match(/(\d{2})\.(\d{2})\.(\d{2})\s+\d{3,4}/);
    if (m) { cur = `20${m[1]}-${m[2]}-${m[3]}`; }
    m = line.match(/\{(\d{2})(\d{2})\}/);
    if (m) { cur = `${new Date().getFullYear()}-${m[1]}-${m[2]}`; }
    m = line.match(/^\[(\d{1,2})\/(\d{1,2}),/);
    if (m && !cur) { const yr=new Date().getFullYear(); cur=`${yr}-${String(m[1]).padStart(2,'0')}-${String(m[2]).padStart(2,'0')}`; }
    for (const dm of line.matchAll(/\((\d{5})\)/g))
      if (!map.has(dm[1])) map.set(dm[1], cur||'(未识别)');
  }
  return { mode:'receipt', map };
}

function parseB(text) {
  const records = [];
  const lines = text.split('\n').map(l => l.trim()).filter(Boolean);
  let curDate = '';
  let i = 0;
  while (i < lines.length) {
    const line = lines[i];

    // ISO date in parens anywhere in line (including WhatsApp headers)
    let dm = line.match(/\((\d{4}-\d{2}-\d{2})\)/);
    if (dm) { curDate = dm[1]; i++; continue; }

    // Standalone ISO date
    dm = line.match(/^(\d{4}-\d{2}-\d{2})$/);
    if (dm) { curDate = dm[1]; i++; continue; }

    // "NO WINNING RECORDS" or Chinese equivalent — store placeholder so date is tracked
    if ((/NO WINNING RECORDS/i.test(line) || /没有中奖记录/.test(line)) && curDate) {
      // Only add if we don't already have a record for this date
      const alreadyHas = records.some(r => r.dateB === curDate && r._noWin);
      if (!alreadyHas) {
        records.push({ docNo:'__NOWIN__', line:'NO WINNING RECORDS', betType:'', amount:'', dateB:curDate, _noWin:true });
      }
      i++; continue;
    }

    // Normal 5-digit doc number
    const m = line.match(/\((\d{5})\)/);
    if (m) {
      const docNo = m[1];
      let betType = '';
      if (i+1 < lines.length) {
        const next = lines[i+1];
        if (!/\(\d{5}\)/.test(next) && !/^\d+\.\d{2}$/.test(next.replace(/,/g,''))) { betType=next; i++; }
      }
      let amount = '';
      if (i+1 < lines.length) {
        const next = lines[i+1];
        if (/^\d+\.\d{2}$/.test(next.replace(/,/g,''))) { amount=next.replace(/,/g,''); i++; }
      }
      records.push({ docNo, line, betType, amount, dateB:curDate });
    }
    i++;
  }
  return records;
}

// ════════════════════════════════════════════════════════
// PARSE A FOR GT
// ════════════════════════════════════════════════════════
function splitBlocks(text) {
  const lines = text.split('\n');
  const blocks = []; let cur = [];
  for (const line of lines) {
    const t = line.trim();
    if ((/\d{2}\.\d{2}\.\d{2}\s+\d{3,4}/.test(t) || /^\[S88\]/.test(t)) && cur.length) {
      blocks.push(cur.join('\n')); cur = [];
    }
    cur.push(line);
  }
  if (cur.length) blocks.push(cur.join('\n'));
  return blocks.filter(b => b.trim());
}

function parseAforGT(text) {
  const rows = [];
  for (const block of splitBlocks(text)) {
    const lines = block.split('\n').map(l => l.trim()).filter(Boolean);
    let dateStr = '';
    for (const line of lines) {
      let m = line.match(/(\d{2})\.(\d{2})\.(\d{2})\s+\d{3,4}/);
      if (m) { dateStr=`${m[3]}/${m[2]}/${m[1]}`; break; }
      m = line.match(/\{(\d{2})(\d{2})\}/);
      if (m) { const yr=new Date().getFullYear().toString().slice(2); dateStr=`${m[2]}/${m[1]}/${yr}`; break; }
      m = line.match(/\b(\d{2})\/(\d{2})\b/);
      if (m && !dateStr) { const yr=new Date().getFullYear().toString().slice(2); dateStr=`${m[1]}/${m[2]}/${yr}`; break; }
      m = line.match(/\b(\d{1,2})(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)\b/i);
      if (m) {
        const mos={jan:'01',feb:'02',mar:'03',apr:'04',may:'05',jun:'06',jul:'07',aug:'08',sep:'09',oct:'10',nov:'11',dec:'12'};
        const mo=mos[m[2].toLowerCase().slice(0,3)]; const yr=new Date().getFullYear().toString().slice(2);
        dateStr=`${String(m[1]).padStart(2,'0')}/${mo}/${yr}`; break;
      }
    }
    let docNo='';
    for (const line of lines) { const m=line.match(/\((\d{5})\)/); if (m){docNo=m[1];break;} }
    let gtAmt=null, currency='RM';
    for (const line of lines) {
      let m=line.match(/GT[=:](\d+(?:\.\d+)?)/i);
      if (!m) m=line.match(/T\((\d+(?:\.\d+)?)\)/i);
      if (m) { gtAmt=parseFloat(m[1]); if (/SGD/i.test(line)) currency='SGD'; break; }
    }
    if (dateStr && gtAmt!==null) {
      rows.push({ date:dateStr, docNo, rm:currency==='RM'?gtAmt:0, sgd:currency==='SGD'?gtAmt:0, currency, kouAmt:0, kouZhongZi:0, owe:0 });
    }
  }
  return rows;
}

// ════════════════════════════════════════════════════════
// MATCH
// ════════════════════════════════════════════════════════
let matchedRows=[], gtRows=[];

function runMatch() {
  const textA = document.getElementById('inputA').value.trim();
  if (!textA) { showToast('请先输入 A 组单据'); return; }
  const allB = getAllRecords();
  if (!allB.length) { showToast('中奖资料库是空的'); return; }

  const {map:aMap} = parseA(textA);
  gtRows = parseAforGT(textA);

  matchedRows = [];
  for (const rec of allB) {
    if (rec._noWin) continue; // skip NO WINNING RECORDS placeholders
    if (aMap.has(rec.docNo)) {
      const dateFromA = aMap.get(rec.docNo);
      const dateA = dateFromA || rec.dateB || '(未识别)';
      matchedRows.push({ dateA, ...rec });
    }
  }

  // Sort by date
  matchedRows.sort((a,b) => a.dateA.localeCompare(b.dateA));

  // Build docMatchAmt
  const docAmt = {};
  for (const r of matchedRows) {
    const amt = parseFloat(r.amount)||0;
    if (!docAmt[r.docNo]) docAmt[r.docNo]=0;
    docAmt[r.docNo]+=amt;
  }
  for (const g of gtRows) {
    const kz=docAmt[g.docNo]||0;
    g.kouZhongZi=kz;
    g.kouAmt=Math.floor((g.rm||0)/10);
    g.owe=(g.rm||0)-g.kouAmt-kz;
  }

  renderMatchTable(matchedRows);
  renderGT(gtRows);
  renderOutC(gtRows);
  renderWA(gtRows);

  document.getElementById('sTotal').textContent=allB.length;
  document.getElementById('sMatch').textContent=matchedRows.length;
  document.getElementById('statRow').style.display='flex';
  document.getElementById('btnExport').disabled=!matchedRows.length;
  document.getElementById('outcSection').style.display=gtRows.length?'block':'none';
  document.getElementById('waSection').style.display=gtRows.length?'block':'none';
  document.getElementById('resultsSection').style.display='block';
  document.getElementById('gtSection').style.display=gtRows.length?'block':'none';
  document.getElementById('imgPreview').style.display='none';
  showToast(`匹配 ${matchedRows.length} 条，GT ${gtRows.length} 张`);
}

function renderGT(rows) {
  const tbody=document.getElementById('gtBody'); tbody.innerHTML='';
  if (!rows.length) return;
  let tRM=0,tSGD=0,tKou=0,tKZ=0,tOwe=0;
  for (const r of rows) {
    tRM+=r.rm; tSGD+=r.sgd; tKou+=r.kouAmt; tKZ+=r.kouZhongZi; tOwe+=r.owe;
    const tr=document.createElement('tr');
    tr.innerHTML=`<td class="date">${r.date}</td><td class="docno">${r.docNo||'—'}</td><td class="num">${r.rm||'—'}</td><td class="num">${r.sgd||'—'}</td><td class="num" style="color:var(--warn)">${r.kouAmt||'—'}</td><td class="num" style="color:var(--warn)">${r.kouZhongZi?r.kouZhongZi.toFixed(2):'—'}</td><td class="num" style="color:var(--accent)">${r.rm?r.owe.toFixed(2):'—'}</td>`;
    tbody.appendChild(tr);
  }
  const tr=document.createElement('tr'); tr.className='gt-total-row';
  tr.innerHTML=`<td colspan="2">Total</td><td class="num">${tRM||'—'}</td><td class="num">${tSGD||'—'}</td><td class="num">${tKou||'—'}</td><td class="num">${tKZ?tKZ.toFixed(2):'—'}</td><td class="num">${tOwe?tOwe.toFixed(2):'—'}</td>`;
  tbody.appendChild(tr);
  document.getElementById('gtCount').textContent=`${rows.length} 张`;
}

// ════════════════════════════════════════════════════════
// STRIKE MAP
// ════════════════════════════════════════════════════════
function extractCode(line) {
  const m=line.match(/^([A-Za-z]+)-\d+-(\d{4})\s/);
  if (m) return m[1].toUpperCase()+m[2];
  const m2=line.match(/([A-Za-z])[-–]?\d+[-–](\d{4})/);
  if (m2) return m2[1].toUpperCase()+m2[2];
  return '';
}

function buildStrikeMap(matched) {
  const rmMap={}, sgdMap={};
  for (const r of matched) {
    const code=extractCode(r.line);
    const amt=parseFloat(r.amount)||0;
    if (!amt) continue;
    const entry=`${amt%1===0?amt:amt.toFixed(2)}(${code||r.docNo})`;
    if (/SGD/i.test(r.betType)||/SGD/i.test(r.line)) {
      if (!sgdMap[r.docNo]) sgdMap[r.docNo]=[];
      sgdMap[r.docNo].push(entry);
    } else {
      if (!rmMap[r.docNo]) rmMap[r.docNo]=[];
      rmMap[r.docNo].push(entry);
    }
  }
  return {rmMap,sgdMap};
}

// ════════════════════════════════════════════════════════
// OUTPUT C — table render
// ════════════════════════════════════════════════════════
function renderOutC(rows) {
  if (!rows.length) return;
  const {rmMap,sgdMap}=buildStrikeMap(matchedRows);
  const tRM=rows.reduce((s,r)=>s+r.rm,0);
  const tSGD=rows.reduce((s,r)=>s+r.sgd,0);
  const grand=tRM+tSGD;
  const disc=Math.floor(grand/10);
  const tKZ=rows.reduce((s,r)=>s+r.kouZhongZi,0);
  const bal=grand-disc-tKZ;

  const table=document.getElementById('outcTable');
  let html='<thead><tr><th style="width:68px">Date</th><th style="width:44px">RM</th><th style="width:44px">SGD</th><th style="min-width:80px">RM Strike 中字</th><th style="min-width:80px">SGD Strike 中字</th></tr></thead><tbody>';

  // Sort rows by date
  const sorted=[...rows].sort((a,b)=>a.date.localeCompare(b.date));
  for (const r of sorted) {
    const rmS=(rmMap[r.docNo]||[]).join('\n');
    const sgdS=(sgdMap[r.docNo]||[]).join('\n');
    html+=`<tr><td class="left">${r.date}</td><td>${r.rm||''}</td><td>${r.sgd||''}</td><td style="white-space:pre-line;text-align:left;color:var(--blue)">${esc(rmS)}</td><td style="white-space:pre-line;text-align:left;color:var(--blue)">${esc(sgdS)}</td></tr>`;
  }

  html+=`<tr class="sep-row"><td class="left">Total 总数</td><td>${tRM||''}</td><td>${tSGD||''}</td><td></td><td></td></tr>`;
  html+=`<tr class="discount-row"><td class="left">Discount 扣</td><td>-${disc}</td><td></td><td></td><td></td></tr>`;
  html+=`<tr class="strike-row"><td class="left">Strike 扣中字</td><td>-${tKZ?tKZ.toFixed(2):0}</td><td></td><td></td><td></td></tr>`;
  html+=`<tr class="balance-row"><td class="left">Balance 尚欠</td><td>${bal.toFixed(2)}</td><td></td><td></td><td></td></tr>`;
  html+='</tbody>';
  table.innerHTML=html;
}

// ════════════════════════════════════════════════════════
// IMAGE EXPORT — render Output C to canvas then show as <img>
// ════════════════════════════════════════════════════════
function generateImage() {
  const rows = gtRows;
  if (!rows.length) { showToast('没有数据'); return; }

  const { rmMap, sgdMap } = buildStrikeMap(matchedRows);
  const sorted = [...rows].sort((a, b) => a.date.localeCompare(b.date));
  const tRM  = rows.reduce((s, r) => s + r.rm, 0);
  const tSGD = rows.reduce((s, r) => s + r.sgd, 0);
  const grand = tRM + tSGD;
  const disc  = Math.floor(grand / 10);
  const tKZ   = rows.reduce((s, r) => s + r.kouZhongZi, 0);
  const bal   = grand - disc - tKZ;

  // Build data rows: [date, rm, sgd, strike]
  const dataRows = [];
  for (const r of sorted) {
    const rmS  = (rmMap[r.docNo]  || []).join(' / ');
    const sgdS = (sgdMap[r.docNo] || []).join(' / ');
    const strike = [rmS, sgdS].filter(Boolean).join(' | ');
    dataRows.push([r.date, r.rm ? String(r.rm) : '', r.sgd ? String(r.sgd) : '', strike]);
  }

  // Summary rows
  const summaryRows = [
    { label: 'Total 总数',    val: String(grand || ''), type: 'total' },
    { label: 'Discount 扣',   val: `-${disc}`,           type: 'discount' },
    { label: 'Strike 扣中字', val: `-${tKZ ? tKZ.toFixed(2) : 0}`, type: 'strike' },
    { label: 'Balance 尚欠',  val: bal.toFixed(2),       type: 'balance' },
  ];

  // Canvas setup
  const DPR   = window.devicePixelRatio || 2;
  const FS    = 15;        // font size px (logical)
  const LH    = 26;        // line height
  const PAD   = 14;        // outer padding
  const CELL  = 6;         // inner cell padding

  // Column widths (logical px)
  const COL = [88, 50, 50, 0]; // date, RM, SGD, strike (auto)

  // Use offscreen canvas to measure
  const tmpC  = document.createElement('canvas');
  const tmpCx = tmpC.getContext('2d');
  tmpCx.font  = `${FS}px monospace`;

  // Measure max strike width
  let maxStrike = 80;
  for (const r of dataRows) {
    const w = tmpCx.measureText(r[3]).width;
    if (w > maxStrike) maxStrike = w;
  }
  COL[3] = Math.ceil(maxStrike) + CELL * 2 + 10;

  const totalCols = COL.reduce((a, b) => a + b, 0);
  const W = totalCols + PAD * 2;

  // Count rows: header + sep + data + sep + summary
  const totalLines = 1 + 1 + dataRows.length + 1 + summaryRows.length;
  const H = totalLines * LH + PAD * 2 + 8;

  // Create real canvas scaled for device
  const canvas = document.getElementById('outcCanvas');
  canvas.width  = W  * DPR;
  canvas.height = H  * DPR;
  canvas.style.width  = W  + 'px';
  canvas.style.height = H  + 'px';

  const ctx = canvas.getContext('2d');
  ctx.scale(DPR, DPR);

  // Background
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, W, H);

  // Helper: draw a row background
  function rowBg(y, color, h) {
    ctx.fillStyle = color;
    ctx.fillRect(0, y, W, h || LH);
  }

  // Helper: draw text in cell
  function cell(text, x, y, align, color, bold) {
    ctx.fillStyle = color || '#1a1d23';
    ctx.font = `${bold ? 'bold ' : ''}${FS}px monospace`;
    ctx.textAlign = align || 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(String(text), x, y + LH / 2);
  }

  // Helper: draw separator line
  function sep(y) {
    ctx.strokeStyle = '#9ca3af';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(PAD, y + LH / 2);
    ctx.lineTo(W - PAD, y + LH / 2);
    ctx.stroke();
  }

  // Column x positions (left-aligned)
  const xs = [
    PAD,
    PAD + COL[0],
    PAD + COL[0] + COL[1],
    PAD + COL[0] + COL[1] + COL[2],
  ];

  let y = PAD;

  // Header row
  rowBg(y, '#e5e7eb');
  cell('Date',     xs[0] + CELL, y, 'left',  '#4b5563', true);
  cell('RM',       xs[1] + COL[1] - CELL, y, 'right', '#4b5563', true);
  cell('SGD',      xs[2] + COL[2] - CELL, y, 'right', '#4b5563', true);
  cell('Strike 中字', xs[3] + CELL, y, 'left',  '#4b5563', true);
  y += LH;

  // Separator
  sep(y); y += LH;

  // Data rows
  for (const [i, r] of dataRows.entries()) {
    if (i % 2 === 1) rowBg(y, '#f9fafb');
    cell(r[0], xs[0] + CELL,           y, 'left',  '#374151');
    cell(r[1], xs[1] + COL[1] - CELL,  y, 'right', '#374151');
    cell(r[2], xs[2] + COL[2] - CELL,  y, 'right', '#374151');
    cell(r[3], xs[3] + CELL,           y, 'left',  '#2563eb');
    y += LH;
  }

  // Separator
  sep(y); y += LH;

  // Summary rows
  for (const s of summaryRows) {
    let bg = '#f3f4f6', textColor = '#374151';
    if (s.type === 'balance')  { bg = '#fef08a'; textColor = '#854d0e'; }
    if (s.type === 'discount') { textColor = '#dc6027'; }
    if (s.type === 'strike')   { textColor = '#2563eb'; }
    rowBg(y, bg);
    cell(s.label, xs[0] + CELL,          y, 'left',  textColor, true);
    cell(s.val,   xs[1] + COL[1] - CELL, y, 'right', textColor, true);
    y += LH;
  }

  // Border around whole image
  ctx.strokeStyle = '#d1d5db';
  ctx.lineWidth = 1;
  ctx.strokeRect(0.5, 0.5, W - 1, H - 1);

  // Convert canvas to <img> for long-press save on mobile
  const dataURL = canvas.toDataURL('image/png');
  const imgEl = document.getElementById('outcImg');
  imgEl.src = dataURL;
  imgEl.style.display = 'block';
  canvas.style.display = 'none';

  document.getElementById('imgPreview').style.display = 'block';
  showToast('图片已生成！长按图片 → 保存到相册 → 发送到 WhatsApp');
}

function downloadImage() {
  const imgEl = document.getElementById('outcImg');
  if (!imgEl.src || imgEl.style.display === 'none') { generateImage(); return; }
  const a = document.createElement('a');
  a.download = `输出C_${new Date().toISOString().slice(0,10)}.png`;
  a.href = imgEl.src;
  a.click();
  showToast('图片已下载');
}

// ════════════════════════════════════════════════════════
// WA preview
// ════════════════════════════════════════════════════════
function renderWA(rows) {
  const sorted=[...rows].sort((a,b)=>a.date.localeCompare(b.date));
  const tRM=rows.reduce((s,r)=>s+r.rm,0);
  const tSGD=rows.reduce((s,r)=>s+r.sgd,0);
  const pad=(s,n)=>String(s).padEnd(n);
  const padL=(s,n)=>String(s).padStart(n);
  const C1=10,C2=8;
  const lines=[];
  lines.push(pad('Date',C1)+pad('RM',C2)+(tSGD?'SGD':''));
  lines.push('─'.repeat(C1+C2+(tSGD?6:0)));
  for (const r of sorted) {
    lines.push(pad(r.date,C1)+padL(r.rm||'',C2-2).padEnd(C2)+(tSGD?padL(r.sgd||'',6):''));
  }
  lines.push('─'.repeat(C1+C2+(tSGD?6:0)));
  lines.push(pad('Total',C1)+padL(tRM,C2)+(tSGD?padL(tSGD,6):''));
  document.getElementById('waText').textContent=lines.join('\n');
}

function copyWA() {
  const t=document.getElementById('waText').textContent;
  doClip(t, '已复制 WhatsApp 格式');
}

// ════════════════════════════════════════════════════════
// EXPORT
// ════════════════════════════════════════════════════════
function exportMatchExcel() {
  if (!matchedRows.length) return;
  const wb=XLSX.utils.book_new();
  const data=[['日期','单据号码','中奖资料行','投注类型','金额','来源']];
  for (const r of matchedRows)
    data.push([r.dateA,r.docNo,r.line,r.betType,r.amount?parseFloat(r.amount):'',r._grp==='A'?'Aliapos':'Alibaba']);
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:14},{wch:10},{wch:28},{wch:18},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'匹配结果');
  XLSX.writeFile(wb,`匹配结果_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('匹配结果已导出');
}

function exportGT() {
  if (!gtRows.length) return;
  const wb=XLSX.utils.book_new();
  const data=[['Date','单据号','RM','SGD','扣','扣中字','尚欠']];
  for (const r of gtRows)
    data.push([r.date,r.docNo,r.rm||'',r.sgd||'',r.kouAmt||'',r.kouZhongZi?+r.kouZhongZi.toFixed(2):'',r.rm?+r.owe.toFixed(2):'']);
  const tRM=gtRows.reduce((s,r)=>s+r.rm,0),tSGD=gtRows.reduce((s,r)=>s+r.sgd,0);
  const tKou=gtRows.reduce((s,r)=>s+r.kouAmt,0),tKZ=gtRows.reduce((s,r)=>s+r.kouZhongZi,0);
  const tOwe=gtRows.reduce((s,r)=>s+r.owe,0);
  data.push(['Total','',tRM||'',tSGD||'',tKou||'',+tKZ.toFixed(2)||'',+tOwe.toFixed(2)||'']);
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:10},{wch:8},{wch:8},{wch:8},{wch:6},{wch:10},{wch:10}];
  XLSX.utils.book_append_sheet(wb,ws,'GT汇总');
  XLSX.writeFile(wb,`GT汇总_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('GT汇总已导出');
}

function exportOutC() {
  if (!gtRows.length) return;
  const {rmMap,sgdMap}=buildStrikeMap(matchedRows);
  const sorted=[...gtRows].sort((a,b)=>a.date.localeCompare(b.date));
  const tRM=gtRows.reduce((s,r)=>s+r.rm,0),tSGD=gtRows.reduce((s,r)=>s+r.sgd,0);
  const grand=tRM+tSGD, disc=Math.floor(grand/10);
  const tKZ=gtRows.reduce((s,r)=>s+r.kouZhongZi,0), bal=grand-disc-tKZ;
  const wb=XLSX.utils.book_new();
  const data=[['Date','RM','SGD','RM Strike 中字','SGD Strike 中字']];
  for (const r of sorted) {
    const rmS=(rmMap[r.docNo]||[]).join('\n');
    const sgdS=(sgdMap[r.docNo]||[]).join('\n');
    data.push([r.date,r.rm||'',r.sgd||'',rmS,sgdS]);
  }
  data.push(['Total 总数',tRM,tSGD,'','']);
  data.push(['Discount 扣',-disc,'','','']);
  data.push(['Strike 扣中字',-(tKZ||0),'','','']);
  data.push(['Balance 尚欠',+bal.toFixed(2),'','','']);
  const ws=XLSX.utils.aoa_to_sheet(data);
  ws['!cols']=[{wch:10},{wch:7},{wch:7},{wch:18},{wch:18}];
  // Yellow balance row
  const br=data.length-1;
  for (let c=0;c<5;c++) {
    const ref=XLSX.utils.encode_cell({r:br,c});
    if (!ws[ref]) ws[ref]={v:''};
    ws[ref].s={fill:{fgColor:{rgb:'FEF08A'}},font:{bold:true}};
  }
  XLSX.utils.book_append_sheet(wb,ws,'输出C');
  XLSX.writeFile(wb,`输出C_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast('输出C已导出');
}

// ════════════════════════════════════════════════════════
// FILE LOADERS
// ════════════════════════════════════════════════════════
function loadFile(side) {
  const input=document.getElementById('file'+side);
  const file=input.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e => {
    document.getElementById('inputA').value=e.target.result;
    updateCounterA(); showToast(`已载入：${file.name}`); input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

function loadFileToAdd() {
  const input=document.getElementById('fileBAdd');
  const file=input.files[0]; if (!file) return;
  const reader=new FileReader();
  reader.onload=e => {
    document.getElementById('inputBAdd').value=e.target.result;
    showToast(`已载入：${file.name}，请按「添加」`); input.value='';
  };
  reader.readAsText(file,'UTF-8');
}

// ════════════════════════════════════════════════════════
// MISC
// ════════════════════════════════════════════════════════
document.getElementById('inputA').addEventListener('input', updateCounterA);

function updateCounterA() {
  const txt=document.getElementById('inputA').value.trim();
  const el=document.getElementById('counterA');
  if (!txt) { el.innerHTML='—'; return; }
  const {mode,map}=parseA(txt);
  el.innerHTML=`识别到 <em>${map.size}</em> 个号码（${mode==='manual'?'手动模式':'单据模式'}）`;
}

function clearA() {
  document.getElementById('inputA').value='';
  document.getElementById('counterA').innerHTML='—';
}

function esc(str) { return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function doClip(text, msg) {
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast(msg)).catch(()=>fallbackCopy(text,msg));
  } else fallbackCopy(text,msg);
}

function fallbackCopy(text, msg) {
  const ta=document.createElement('textarea');
  ta.value=text; ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try { document.execCommand('copy'); showToast(msg||'已复制'); } catch { showToast('复制失败'); }
  document.body.removeChild(ta);
}

function showToast(msg) {
  const el=document.getElementById('toast');
  el.textContent=msg; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),3000);
}

refreshUI();
